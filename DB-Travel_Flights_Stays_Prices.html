<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIVOR | Flight & Hotel Data Collector</title>
    
    <!-- Betűtípusok és Ikonok -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Ikonkészlet -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- GSAP Animációs könyvtár -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
        /* ============================================
           NIVOR BRAND SYSTEM & PAGE STYLES
           ============================================ */

        :root {
            /* Primary Colors */
            --brand-prussian-blue: #1A2238;
            --brand-burnt-peach: #E67E5D;
            /* Secondary Colors */
            --brand-platinum: #F5F6F7;
            --brand-soft-blush: #F8E0E0;
            --brand-pale-sky: #F1F9FC;
            --brand-luxury-mono: #0F1420;
            --surface-white: #FFFFFF;
            /* Radius */
            --radius-sm: 0.5rem;
            --radius-md: 1rem;
            --radius-lg: 2rem;
            --radius-full: 9999px;
            /* Shadows */
            --shadow-subtle: 0 4px 12px rgba(26, 34, 56, 0.05);
            --shadow-elevated: 0 20px 40px rgba(26, 34, 56, 0.05);
            --shadow-floating: 0 40px 80px rgba(26, 34, 56, 0.12);
            /* Motion */
            --ease-premium: cubic-bezier(0.25, 0.8, 0.25, 1);
            --ease-out: cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* --- GLOBAL RESET --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        * { -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--brand-platinum);
            color: var(--brand-prussian-blue);
            font-family: 'Manrope', sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1.5rem;
        }

        /* --- BRAND SELECTION & SCROLLBAR --- */
        ::selection { background: rgba(230, 126, 93, 0.2); color: inherit; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--brand-platinum); }
        ::-webkit-scrollbar-thumb { background: var(--brand-burnt-peach); border-radius: 10px; }

        /* --- TYPOGRAPHY --- */
        h1 {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.15;
            letter-spacing: -0.02em;
            color: var(--brand-prussian-blue);
            margin-bottom: 0.5rem;
        }
        p {
            font-size: 1rem;
            font-weight: 400;
            line-height: 1.5;
            color: var(--brand-prussian-blue);
            opacity: 0.7;
            margin-bottom: 2rem;
        }
        .section-tag {
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--brand-burnt-peach);
            margin-bottom: 0.5rem;
            display: block;
        }

        /* --- LAYOUT WRAPPER --- */
        .page-wrapper {
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        /* --- BUTTONS --- */
        .btn-nvr {
            width: 100%;
            padding: 1.25rem 2.5rem;
            border-radius: var(--radius-full);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 0.85rem;
            font-family: 'Manrope', sans-serif;
            cursor: pointer;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            background: var(--brand-burnt-peach);
            color: white;
            box-shadow: var(--shadow-subtle);
            transition: transform 0.16s var(--ease-premium),
                        background 0.3s var(--ease-out),
                        box-shadow 0.3s var(--ease-out),
                        opacity 0.3s var(--ease-out);
            text-decoration: none;
            margin-top: 1.5rem;
        }
        .btn-nvr:hover { transform: translateY(-4px); box-shadow: var(--shadow-elevated); }
        .btn-nvr:active { transform: scale(0.97); }
        .btn-nvr .lucide { width: 18px; height: 18px; }

        .btn-nvr--compact {
            width: auto;
            display: inline-flex;
            padding: 0.8rem 1.2rem;
            font-size: 0.75rem;
            background: transparent;
            color: var(--brand-prussian-blue);
            box-shadow: none;
            margin-top: 0;
            margin-bottom: 2rem;
            justify-content: flex-start;
            border: 1px solid rgba(26, 34, 56, 0.1);
            border-radius: var(--radius-full);
        }
        .btn-nvr--compact:hover {
            background: var(--surface-white);
            box-shadow: var(--shadow-subtle);
            transform: translateY(-2px);
        }
        .btn-nvr--compact .lucide { color: var(--brand-prussian-blue); width: 16px; height: 16px; }

        .btn-nvr--outline {
            background: transparent;
            border: 2px dashed rgba(26, 34, 56, 0.2);
            color: var(--brand-prussian-blue);
            box-shadow: none;
            margin-top: 0;
            padding: 1rem;
        }
        .btn-nvr--outline:hover {
            border-color: var(--brand-burnt-peach);
            color: var(--brand-burnt-peach);
            background: rgba(230, 126, 93, 0.05);
            transform: translateY(0);
            box-shadow: none;
        }

        /* --- FORM CONTAINER & SECTIONS --- */
        .form-container {
            background: var(--surface-white);
            border-radius: var(--radius-lg);
            padding: 3.5rem 4rem;
            box-shadow: var(--shadow-elevated);
            width: 100%;
        }

        .form-section {
            position: relative;
            border: 1px solid var(--brand-platinum);
            border-radius: var(--radius-md);
            padding: 2.5rem;
            margin-bottom: 2.5rem;
            background: var(--surface-white);
            transition: border-color 0.3s var(--ease-premium);
        }
        
        .form-section:hover { border-color: rgba(26, 34, 56, 0.15); }

        .form-section-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--brand-platinum);
        }

        .form-section-title {
            font-size: 1rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--brand-prussian-blue);
        }

        .form-section-header .lucide {
            color: var(--brand-burnt-peach);
            width: 20px;
            height: 20px;
        }

        .form-group {
            position: relative;
            margin-bottom: 2rem;
        }
        .form-group:last-child { margin-bottom: 0; }

        /* --- DESKTOP GRIDS --- */
        .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: end; }
        .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem; align-items: end; }
        .form-grid-4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 1.5rem; align-items: end; }

        .form-grid-2 .form-group, 
        .form-grid-3 .form-group,
        .form-grid-4 .form-group { margin-bottom: 0; }

        .form-grid-2 .checkbox-card,
        .form-grid-3 .checkbox-card { margin-bottom: 0; height: 100%; }

        /* --- INPUT STYLES --- */
        label.form-label {
            font-size: 0.75rem;
            font-weight: 800;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: block;
            margin-bottom: 0.2rem;
            color: var(--brand-prussian-blue);
        }

        input[type="text"], 
        input[type="number"], 
        input[type="date"],
        textarea {
            width: 100%;
            font-family: 'Manrope', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            color: var(--brand-prussian-blue);
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--brand-platinum);
            padding: 0.6rem 0;
            outline: none;
            border-radius: 0;
            transition: border-color 0.3s var(--ease-premium);
        }

        input[type="text"]:focus, 
        input[type="number"]:focus, 
        input[type="date"]:focus,
        textarea:focus {
            border-bottom-color: var(--brand-burnt-peach);
        }

        /* Dátum mező finomhangolás */
        input[type="date"]::-webkit-calendar-picker-indicator {
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s ease;
        }
        input[type="date"]::-webkit-calendar-picker-indicator:hover {
            opacity: 1;
        }

        /* Dinamikus blokk (Útvonalak) */
        .dynamic-segment {
            background: var(--brand-pale-sky);
            border-radius: var(--radius-sm);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid transparent;
            position: relative;
        }
        
        .segment-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(26, 34, 56, 0.05);
        }

        .segment-title {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--brand-prussian-blue);
            opacity: 0.5;
        }

        .btn-remove {
            background: none;
            border: none;
            color: #D9534F;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.2rem;
            border-radius: 4px;
        }
        .btn-remove:hover {
            opacity: 1;
            background: rgba(217, 83, 79, 0.1);
        }
        .btn-remove .lucide { width: 16px; height: 16px; }

        /* --- CHECKBOX CARDS --- */
        .checkbox-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--brand-platinum);
            padding: 1.2rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s var(--ease-premium);
            border: 1px solid transparent;
            margin-bottom: 0.8rem;
        }

        .checkbox-card input[type="checkbox"] { display: none; }

        .checkbox-card .card-label {
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        
        .checkbox-card .card-label .lucide {
            color: var(--brand-prussian-blue);
            opacity: 0.5;
            width: 18px;
            height: 18px;
        }

        .checkbox-card .custom-indicator {
            width: 22px;
            height: 22px;
            border: 2px solid rgba(26, 34, 56, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s var(--ease-premium);
            background: var(--surface-white);
        }

        .checkbox-card .custom-indicator .lucide {
            color: white;
            width: 14px;
            height: 14px;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.2s var(--ease-premium);
        }

        /* Checked States */
        .checkbox-card.checked {
            border-color: rgba(230, 126, 93, 0.4);
            background: rgba(230, 126, 93, 0.05);
            box-shadow: var(--shadow-subtle);
        }
        .checkbox-card.checked .card-label .lucide.icon-accent {
            color: var(--brand-burnt-peach);
            opacity: 1;
        }
        .checkbox-card.checked .custom-indicator {
            background: var(--brand-burnt-peach);
            border-color: var(--brand-burnt-peach);
        }
        .checkbox-card.checked .custom-indicator .lucide {
            opacity: 1;
            transform: scale(1);
        }

        /* --- TOAST NOTIFICATION --- */
        .toast-notification {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translate(-50%, 150%);
            background: var(--brand-luxury-mono);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: var(--radius-full);
            font-size: 0.9rem;
            font-weight: 600;
            box-shadow: var(--shadow-floating);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            transition: transform 0.5s var(--ease-premium);
            z-index: 9999;
            width: max-content;
            max-width: 90vw;
        }
        .toast-notification.show { transform: translate(-50%, 0); }
        .toast-notification .lucide { color: #4BB543; }

        /* Animációs kezdőállapot */
        .reveal-item { opacity: 0; transform: translateY(20px); }

        /* Responsive Mobile */
        @media (max-width: 768px) {
            body { padding: 1.5rem 1rem; }
            .form-container { padding: 2.5rem 1.5rem; }
            .form-section { padding: 1.5rem; margin-bottom: 1.5rem; }
            
            .form-grid-2, .form-grid-3, .form-grid-4 {
                grid-template-columns: 1fr;
                gap: 0;
            }

            .form-grid-2 .form-group, 
            .form-grid-3 .form-group,
            .form-grid-4 .form-group {
                margin-bottom: 1.5rem;
            }
            
            .dynamic-segment { padding: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        
        <!-- Vissza a vezérlőpulthoz gomb -->
        <a href="index.html" class="btn-nvr btn-nvr--compact reveal-item">
            <i data-lucide="arrow-left"></i>
            <span>Vissza a vezérlőpultra</span>
        </a>

        <!-- Űrlap konténer -->
        <div class="form-container">
            <div class="reveal-item" style="margin-bottom: 2.5rem;">
                <span class="section-tag">NIVOR Hub</span>
                <h1>Járat & Szállás Rögzítés</h1>
                <p style="margin-bottom: 0;">Rögzítsd a releváns repülőjegy és szállás alternatívákat a rendszerbe.</p>
            </div>

            <form id="flightHotelForm" autocomplete="off">
                
                <!-- SZEKCIÓ 1: KERESÉS ALAPJAI ÉS FÖLDRAJZI ADATOK -->
                <div class="form-section reveal-item" style="z-index: 40;">
                    <div class="form-section-header">
                        <i data-lucide="map-pin"></i>
                        <h3 class="form-section-title">Alapadatok & Helyszín</h3>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="refDate">Referencia dátum</label>
                        <input type="date" id="refDate" name="refDate">
                    </div>

                    <div class="form-grid-2" style="margin-bottom: 1.5rem;">
                        <div class="form-group">
                            <label class="form-label" for="country">Ország</label>
                            <input type="text" id="country" name="country" placeholder="pl. Spanyolország">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="region">Régió</label>
                            <input type="text" id="region" name="region" placeholder="pl. Andalúzia">
                        </div>
                    </div>
                    
                    <div class="form-grid-2">
                        <div class="form-group">
                            <label class="form-label" for="regionType">Régió típusa</label>
                            <input type="text" id="regionType" name="regionType" placeholder="pl. Tengerparti / Hegyvidéki">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="city">Város</label>
                            <input type="text" id="city" name="city" placeholder="pl. Málaga">
                        </div>
                    </div>
                </div>

                <!-- SZEKCIÓ 2: UTAZÁS & REPÜLŐJEGY -->
                <div class="form-section reveal-item" style="z-index: 30;">
                    <div class="form-section-header">
                        <i data-lucide="plane-takeoff"></i>
                        <h3 class="form-section-title">Időpontok & Repülőjegy</h3>
                    </div>

                    <div class="form-grid-2" style="margin-bottom: 2rem;">
                        <div class="form-group">
                            <label class="form-label" for="startDate">Utazás kezdete</label>
                            <input type="date" id="startDate" name="startDate">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="endDate">Utazás vége</label>
                            <input type="date" id="endDate" name="endDate">
                        </div>
                    </div>

                    <div class="form-grid-3">
                        <div class="form-group">
                            <label class="form-label" for="flightPrice">Repülőgép ára (HUF)</label>
                            <!-- A price-formatter osztály végzi a JS tagolást -->
                            <input type="text" id="flightPrice" name="flightPrice" class="price-formatter" placeholder="100 000">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="endDate">Utazás vége</label>
                            <input type="date" id="endDate" name="endDate" required>
                        </div>
                    </div>

                    <div class="form-grid-3">
                        <div class="form-group">
                            <label class="form-label" for="flightPrice">Repülőgép ára (HUF)</label>
                            <!-- A price-formatter osztály végzi a JS tagolást -->
                            <input type="text" id="flightPrice" name="flightPrice" class="price-formatter" placeholder="100 000" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="airport">Reptér</label>
                            <input type="text" id="airport" name="airport" placeholder="pl. BUD">
                        </div>
                        <div class="form-group">
                            <label class="checkbox-card" id="directFlightCard">
                                <span class="card-label">
                                    <i data-lucide="navigation" class="icon-accent"></i>
                                    Direkt járat
                                </span>
                                <div class="custom-indicator"><i data-lucide="check"></i></div>
                                <input type="checkbox" id="directFlight" name="directFlight">
                            </label>
                        </div>
                    </div>
                </div>

                <!-- SZEKCIÓ 3: ÚTVONALAK (DINAMIKUS) -->
                <div class="form-section reveal-item" style="z-index: 20;">
                    <div class="form-section-header">
                        <i data-lucide="route"></i>
                        <h3 class="form-section-title">Útvonalak</h3>
                    </div>

                    <!-- Dinamikus Útvonalak Tárolója -->
                    <div id="flight-segments-container">
                        <!-- Az első (alapértelmezett) útvonal blokk -->
                        <div class="dynamic-segment">
                            <div class="segment-header">
                                <span class="segment-title">1. Útvonal</span>
                                <!-- Az elsőnél nincs törlés gomb -->
                            </div>
                            
                            <div class="form-group" style="margin-bottom: 1.5rem;">
                                <label class="form-label">Légitársaság</label>
                                <input type="text" name="airlines[]" placeholder="pl. Wizz Air, Ryanair...">
                            </div>

                            <div class="form-grid-2" style="margin-bottom: 1.5rem;">
                                <div class="form-group">
                                    <label class="form-label">Indulási város</label>
                                    <input type="text" name="depCities[]" placeholder="pl. Budapest">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Indulási reptér</label>
                                    <input type="text" name="depAirports[]" placeholder="pl. BUD">
                                </div>
                            </div>

                            <div class="form-grid-2">
                                <div class="form-group">
                                    <label class="form-label">Érkezési város</label>
                                    <input type="text" name="arrCities[]" placeholder="pl. Málaga">
                                </div>
                                <div class="form-group">
                                    <label class="form-label">Érkezési reptér</label>
                                    <input type="text" name="arrAirports[]" placeholder="pl. AGP">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Új hozzáadása gomb -->
                    <button type="button" id="btnAddSegment" class="btn-nvr btn-nvr--outline">
                        <i data-lucide="plus"></i>
                        <span>Új útvonal hozzáadása</span>
                    </button>
                </div>

                <!-- SZEKCIÓ 4: SZÁLLÁS ADATOK -->
                <div class="form-section reveal-item" style="z-index: 10;">
                    <div class="form-section-header">
                        <i data-lucide="building-2"></i>
                        <h3 class="form-section-title">Szállás alternatívák</h3>
                    </div>

                    <div class="form-group" style="margin-bottom: 2rem;">
                        <label class="form-label" for="nightsDiff">Éjszakák Diff</label>
                        <input type="number" id="nightsDiff" name="nightsDiff" placeholder="pl. 1">
                    </div>

                    <div class="form-grid-2" style="margin-bottom: 2rem; padding-bottom: 2rem; border-bottom: 1px dashed var(--brand-platinum);">
                        <div class="form-group">
                            <label class="form-label" for="cheapHotelName">Olcsóbb szállás Neve</label>
                            <input type="text" id="cheapHotelName" name="cheapHotelName" placeholder="Hotel Név">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="cheapHotelPrice">Olcsóbb szállás Ára / 2 fő (HUF)</label>
                            <input type="text" id="cheapHotelPrice" name="cheapHotelPrice" class="price-formatter" placeholder="80 000">
                        </div>
                    </div>

                    <div class="form-grid-2">
                        <div class="form-group">
                            <label class="form-label" for="expHotelName">Drágább szállás Neve</label>
                            <input type="text" id="expHotelName" name="expHotelName" placeholder="Hotel Név">
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="expHotelPrice">Drágább szállás Ára / 2 fő (HUF)</label>
                            <input type="text" id="expHotelPrice" name="expHotelPrice" class="price-formatter" placeholder="120 000">
                        </div>
                    </div>
                </div>

                <!-- Beküldés gomb -->
                <button type="submit" class="btn-nvr reveal-item">
                    <span>Adatok Rögzítése</span>
                    <i data-lucide="check-circle"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Értesítés (Toast) -->
    <div class="toast-notification" id="toast">
        <i data-lucide="check-circle-2"></i>
        <span id="toastMessage">Sikeresen rögzítve!</span>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();

            // 1. Belépési animáció
            gsap.to(".reveal-item", {
                y: 0, opacity: 1, duration: 0.6, stagger: 0.1, ease: "power3.out", delay: 0.1
            });

            // 2. Számformázó funkció (3-as tagolás)
            const formatPriceInput = (inputElement) => {
                let value = inputElement.value.replace(/\s/g, '').replace(/[^\d]/g, '');
                if (value === '') {
                    inputElement.value = '';
                    return;
                }
                // Hozzáadjuk a szóközöket 3-asával
                inputElement.value = parseInt(value, 10).toLocaleString('hu-HU').replace(/,/g, ' ');
            };

            // Eseményfigyelők rögzítése a meglévő és jövőbeli ár mezőkre
            document.querySelectorAll('.price-formatter').forEach(input => {
                input.addEventListener('input', (e) => formatPriceInput(e.target));
            });

            // 3. Direkt járat checkbox kártya
            const directCard = document.getElementById('directFlightCard');
            const directInput = document.getElementById('directFlight');
            directInput.addEventListener('change', () => {
                if(directInput.checked) directCard.classList.add('checked');
                else directCard.classList.remove('checked');
            });

            // 4. Dinamikus Útvonalak (Hozzáadás / Törlés)
            const segmentsContainer = document.getElementById('flight-segments-container');
            const btnAddSegment = document.getElementById('btnAddSegment');
            let segmentCount = 1;

            btnAddSegment.addEventListener('click', () => {
                segmentCount++;
                
                const segmentHTML = `
                    <div class="dynamic-segment" style="opacity: 0; transform: translateY(10px);">
                        <div class="segment-header">
                            <span class="segment-title">${segmentCount}. Útvonal</span>
                            <button type="button" class="btn-remove" title="Útvonal törlése">
                                <i data-lucide="trash-2"></i>
                            </button>
                        </div>
                        
                        <div class="form-group" style="margin-bottom: 1.5rem;">
                            <label class="form-label">Légitársaság</label>
                            <input type="text" name="airlines[]" placeholder="pl. Wizz Air, Ryanair...">
                        </div>

                        <div class="form-grid-2" style="margin-bottom: 1.5rem;">
                            <div class="form-group">
                                <label class="form-label">Indulási város</label>
                                <input type="text" name="depCities[]" placeholder="pl. Budapest">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Indulási reptér</label>
                                <input type="text" name="depAirports[]" placeholder="pl. BUD">
                            </div>
                        </div>

                        <div class="form-grid-2">
                            <div class="form-group">
                                <label class="form-label">Érkezési város</label>
                                <input type="text" name="arrCities[]" placeholder="pl. Málaga">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Érkezési reptér</label>
                                <input type="text" name="arrAirports[]" placeholder="pl. AGP">
                            </div>
                        </div>
                    </div>
                `;
                
                // HTML beillesztése
                segmentsContainer.insertAdjacentHTML('beforeend', segmentHTML);
                const newSegment = segmentsContainer.lastElementChild;
                
                // Ikonok frissítése
                lucide.createIcons({ root: newSegment });
                
                // Törlés esemény
                const btnRemove = newSegment.querySelector('.btn-remove');
                btnRemove.addEventListener('click', () => {
                    gsap.to(newSegment, { 
                        opacity: 0, height: 0, padding: 0, margin: 0, duration: 0.3, 
                        onComplete: () => newSegment.remove() 
                    });
                });

                // Animált beúszás
                gsap.to(newSegment, { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" });
            });

            // 5. Toast értesítés
            const showToast = (message, isError = false) => {
                const toast = document.getElementById('toast');
                const icon = toast.querySelector('svg'); 
                document.getElementById('toastMessage').innerText = message;
                
                if(isError) {
                    icon.setAttribute('data-lucide', 'alert-circle');
                    icon.style.color = "#D9534F";
                } else {
                    icon.setAttribute('data-lucide', 'check-circle-2');
                    icon.style.color = "#4BB543";
                }
                lucide.createIcons(); 
                
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 3500);
            };

            // 6. Űrlap beküldése
            document.getElementById('flightHotelForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const form = e.target;
                const submitButton = form.querySelector('.btn-nvr[type="submit"]');
                const originalText = submitButton.querySelector('span').innerText;
                
                submitButton.disabled = true;
                submitButton.style.opacity = "0.7";
                submitButton.querySelector('span').innerText = "Rögzítés folyamatban...";

                // Dinamikus adatok összegyűjtése
                const airlines = Array.from(form.querySelectorAll('input[name="airlines[]"]')).map(i => i.value);
                const depCities = Array.from(form.querySelectorAll('input[name="depCities[]"]')).map(i => i.value);
                const depAirports = Array.from(form.querySelectorAll('input[name="depAirports[]"]')).map(i => i.value);
                const arrCities = Array.from(form.querySelectorAll('input[name="arrCities[]"]')).map(i => i.value);
                const arrAirports = Array.from(form.querySelectorAll('input[name="arrAirports[]"]')).map(i => i.value);

                // Útvonal objektumok létrehozása
                const routes = airlines.map((airline, index) => ({
                    airline: airline || "",
                    departure_city: depCities[index] || "",
                    departure_airport: depAirports[index] || "",
                    arrival_city: arrCities[index] || "",
                    arrival_airport: arrAirports[index] || ""
                }));

                // Helper funkció a számok "tisztításához" (szóközök eltávolítása beküldés előtt)
                const getRawNumber = (id) => {
                    const val = document.getElementById(id).value.replace(/\s/g, '');
                    return val ? parseInt(val, 10) : null;
                };

                const nightsDiffVal = document.getElementById('nightsDiff').value;

                const payload = {
                    dates: {
                        reference: document.getElementById('refDate').value || "",
                        start: document.getElementById('startDate').value || "",
                        end: document.getElementById('endDate').value || ""
                    },
                    location: {
                        country: document.getElementById('country').value || "",
                        region: document.getElementById('region').value || "",
                        region_type: document.getElementById('regionType').value || "",
                        city: document.getElementById('city').value || ""
                    },
                    flight: {
                        price: getRawNumber('flightPrice'),
                        airport: document.getElementById('airport').value || "",
                        is_direct: document.getElementById('directFlight').checked,
                        routes: routes
                    },
                    accommodation: {
                        nights_diff: nightsDiffVal ? parseInt(nightsDiffVal, 10) : null,
                        cheap: {
                            name: document.getElementById('cheapHotelName').value || "",
                            price_per_2: getRawNumber('cheapHotelPrice')
                        },
                        expensive: {
                            name: document.getElementById('expHotelName').value || "",
                            price_per_2: getRawNumber('expHotelPrice')
                        }
                    },
                    submit_timestamp: new Date().toISOString()
                };

                console.log("Payload:", payload);

                // Valós Webhook hívás az n8n felé
                try {
                    const response = await fetch('https://n8n.nivor.hu/webhook/TravelFlightsStaysPrices', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (response.ok) {
                        showToast('Adatok sikeresen rögzítve!');
                        form.reset();
                        directCard.classList.remove('checked');
                        
                        // Extra dinamikus mezők eltávolítása (visszaállítás alaphelyzetbe)
                        const extraSegments = segmentsContainer.querySelectorAll('.dynamic-segment:not(:first-child)');
                        extraSegments.forEach(seg => seg.remove());
                        segmentCount = 1;
                    } else {
                        showToast('Szerver hiba történt a rögzítés során.', true);
                    }
                } catch (error) {
                    showToast('Hálózati hiba. Nem sikerült elérni a webhookot.', true);
                } finally {
                    submitButton.disabled = false;
                    submitButton.style.opacity = "1";
                    submitButton.querySelector('span').innerText = originalText;
                }
            });
        });
    </script>
</body>
</html>
